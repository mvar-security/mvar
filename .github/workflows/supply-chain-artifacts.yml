name: Supply Chain Artifacts

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  sbom-and-provenance:
    name: SBOM + Provenance Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --require-hashes -r requirements-ci.txt

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py requirements requirements.txt -o sbom.cdx.json --of JSON
          sha256sum sbom.cdx.json > sbom.cdx.sha256

      - name: Emit provenance statement
        run: |
          cat > provenance.statement.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "commit": "${{ github.sha }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "artifacts": [
              "sbom.cdx.json",
              "sbom.cdx.sha256"
            ]
          }
          EOF
          sha256sum provenance.statement.json > provenance.statement.sha256

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: supply-chain-artifacts
          path: |
            sbom.cdx.json
            sbom.cdx.sha256
            provenance.statement.json
            provenance.statement.sha256

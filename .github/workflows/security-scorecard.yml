name: Security Scorecard

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  scorecard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: |
          python -m pip install --require-hashes -r requirements-ci.txt

      - name: Prepare source import path
        run: ln -sfn mvar-core mvar_core

      - name: Generate scorecard
        run: python3 scripts/generate_security_scorecard.py

      - name: Render STATUS.md
        run: python3 scripts/update_status_md.py

      - name: Upload scorecard artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: security-scorecard
          path: |
            reports/security_scorecard.json
            STATUS.md

name: Security Scorecard

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  scorecard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: |
          python -m pip install --require-hashes -r requirements-ci.txt

      - name: Prepare source import path
        run: ln -sfn mvar-core mvar_core

      - name: Generate scorecard
        run: python3 scripts/generate_security_scorecard.py

      - name: Render STATUS.md
        run: python3 scripts/update_status_md.py

      - name: Upload scorecard artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-scorecard
          path: |
            reports/security_scorecard.json
            STATUS.md
